name: Windows installer

# Builds the ReEnvision AI tray app and the Inno Setup installer on every
# relevant PR, and attaches ReEnvisionAISetup.exe to GitHub releases on
# version tags.

# NOTE: This repo has been consolidated into agent-grid-node/platforms/windows/,
# which is now the active build + release source for the Windows node. systray2 is
# kept only as a backup/reference, so this workflow is manual-dispatch-only —
# automatic PR and tag triggers were removed to avoid double-releasing the same
# installer from two repos. Cut Windows releases by tagging agent-grid-node.
on:
  workflow_dispatch:

jobs:
  build:
    name: Build tray app + installer
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: write   # attach installer to releases on tags
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git describe needs tags for the version stamp

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build tools
        run: |
          go install github.com/tc-hib/go-winres@latest
          choco install innosetup --no-progress -y

      # NOTE: the legacy `-tags unit_test` suite is stale — it expects
      # handleWakeEvent to signal the StartContainer callback channel, but the
      # current lifecycle calls handleStartRequest() (podman) directly, so the
      # tests hang/fail on runners. Re-enable once the suite is updated.
      - name: Vet and compile check
        run: |
          go vet ./...
          go build ./...
          go test ./...

      - name: Build app + installer
        shell: pwsh
        env:
          SKIP_SIGNING: "1"  # no code-signing cert on CI yet (needs the MsSign tool + secret)
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build_windows.ps1

      - name: Verify outputs
        shell: pwsh
        run: |
          if (!(Test-Path "dist\windows\ReEnvisionAI.exe")) { throw "tray exe missing" }
          if (!(Test-Path "dist\ReEnvisionAISetup.exe")) { throw "installer missing" }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ReEnvisionAI-Windows
          path: |
            dist/ReEnvisionAISetup.exe
            dist/ReEnvisionAISetup.exe.sha256
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$env:GITHUB_REF_NAME" dist/ReEnvisionAISetup.exe dist/ReEnvisionAISetup.exe.sha256 --clobber
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:GITHUB_REF_NAME" dist/ReEnvisionAISetup.exe dist/ReEnvisionAISetup.exe.sha256 --generate-notes
          }
